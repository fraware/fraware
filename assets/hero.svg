<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Mat&#233;o H. Petel &#8212; ML researcher, AI for Science</title>
  <desc id="heroDesc">Editorial hero mark with constellation atmosphere for Mat&#233;o H. Petel&#8217;s GitHub profile.</desc>
  <defs>
    <linearGradient id="heroPlane" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop class="g0" offset="0%" stop-color="#E8EDF3"/>
      <stop class="g1" offset="55%" stop-color="#D9E2EA"/>
      <stop class="g2" offset="100%" stop-color="#EEF1F5"/>
    </linearGradient>
    <radialGradient id="heroGlow" cx="72%" cy="28%" r="45%">
      <stop class="glow" offset="0%" stop-color="#2F5D50" stop-opacity="0.22"/>
      <stop class="glowEnd" offset="100%" stop-color="#2F5D50" stop-opacity="0"/>
    </radialGradient>
    <style><![CDATA[
      .bg { fill: #F2F4F7; }
      .name {
        font-family: ui-serif, Georgia, "Times New Roman", serif;
        font-size: 52px; font-weight: 600; letter-spacing: -0.02em; fill: #1A2332;
      }
      .tag {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 18px; font-weight: 500; letter-spacing: 0.04em; fill: #2F5D50;
      }
      .support {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 15px; font-weight: 400; fill: #5A6577;
      }
      .rule { stroke: #2F5D50; stroke-width: 1.5; opacity: 0.85; }
      .constellation { fill: none; stroke: #8FA0B2; stroke-width: 1; opacity: 0.35; }
      .star { fill: #1A2332; }
      .star-pulse { fill: #2F5D50; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0F1419; }
        .g0 { stop-color: #141B24; }
        .g1 { stop-color: #1A2430; }
        .g2 { stop-color: #10161D; }
        .glow { stop-color: #6B9E8E; }
        .glowEnd { stop-color: #6B9E8E; }
        .name { fill: #E6EAF0; }
        .tag { fill: #6B9E8E; }
        .support { fill: #9AA5B5; }
        .rule { stroke: #6B9E8E; }
        .constellation { stroke: #3F4D5E; }
        .star { fill: #E6EAF0; }
        .star-pulse { fill: #6B9E8E; }
      }
    ]]></style>
  </defs>

  <rect class="bg" width="960" height="300"/>
  <rect width="960" height="300" fill="url(#heroPlane)"/>
  <rect width="960" height="300" fill="url(#heroGlow)" opacity="1">
    <animate attributeName="opacity" values="0.75;1;0.75" dur="14s" repeatCount="indefinite"/>
  </rect>

  <g class="constellation" aria-hidden="true">
    <path d="M680 48 L742 78 L810 56 L858 110 L792 148 L720 126 L680 48"/>
    <path d="M760 180 L820 210 L880 188"/>
    <path d="M700 220 L748 248 L802 236"/>
  </g>
  <g aria-hidden="true">
    <circle class="star" cx="680" cy="48" r="2.2"/>
    <circle class="star" cx="742" cy="78" r="1.8"/>
    <circle class="star-pulse" cx="810" cy="56" r="2.4">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle class="star" cx="858" cy="110" r="2"/>
    <circle class="star" cx="792" cy="148" r="1.6"/>
    <circle class="star-pulse" cx="720" cy="126" r="2.1">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle class="star" cx="760" cy="180" r="1.5"/>
    <circle class="star" cx="820" cy="210" r="1.8"/>
    <circle class="star" cx="880" cy="188" r="1.4"/>
    <circle class="star" cx="700" cy="220" r="1.5"/>
    <circle class="star" cx="748" cy="248" r="1.7"/>
    <circle class="star" cx="802" cy="236" r="1.4"/>
  </g>

  <line class="rule" x1="56" y1="78" x2="120" y2="78"/>
  <text class="tag" x="56" y="68">AI FOR SCIENCE</text>
  <text class="name" x="56" y="140">Mat&#233;o H. Petel</text>
  <text class="tag" x="56" y="178" style="letter-spacing:0.02em;font-size:17px">ML researcher &#183; AI for Science</text>
  <text class="support" x="56" y="214">Verified systems for science &#8212; secure infrastructure,</text>
  <text class="support" x="56" y="236">formal methods, and Earth observation.</text>
</svg>