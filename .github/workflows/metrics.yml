name: Metrics
on:
  # Schedule weekly updates (Sunday 00:00 UTC)
  schedule: [{ cron: "0 0 * * 0" }]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master
  push: { branches: ["master"] }
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@v3.34
        with:
          # Requires repo secret METRICS: a classic PAT with "public_repo" (or repo) scope.
          # Create at https://github.com/settings/tokens and set with:
          #   gh secret set METRICS --repo fraware/fraware
          token: ${{ secrets.METRICS }}
          user: fraware
          config_timezone: San Francisco
          config_display: large
          commits_authoring: mpetel@stanford.edu

          # Core look
          plugin_introduction: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_calendar: yes
          plugin_calendar_limit: 2

          # Languages (ignore markup / config noise)
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, JavaScript, SCSS, Ruby, Jupyter Notebook, Shell, Tcl

          # Featured repositories
          plugin_repositories: yes
          plugin_repositories_featured: fraware/accountabilitylayer, fraware/inter-sim-rl, fraware/DeepLiDARPlanet, fraware/leanverifier, SentinelOps-CI/provability-fabric

          # Licenses (kept; disable if it starts erroring)
          plugin_licenses: yes

          # Intentionally off:
          # - achievements: previously showed "Unexpected error"
          # - lines: often renders vanity zeros / empty diffs
          #plugin_achievements: yes
          #plugin_lines: yes
